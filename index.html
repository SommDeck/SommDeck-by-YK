<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%231a1a1a%22/><path d=%22M25 42 Q45 35 75 42 L70 48 Q45 40 30 50 L25 42 M48 48 C48 48 46 75 58 85 C42 80 42 55 42 48 Z%22 fill=%22%23af9462%22/><circle cx=%2240%22 cy=%2243%22 r=%221.5%22 fill=%22%23af9462%22/><circle cx=%2245%22 cy=%2243%22 r=%221.5%22 fill=%22%23af9462%22/><circle cx=%2250%22 cy=%2243%22 r=%221.5%22 fill=%22%23af9462%22/></svg>">
    
    <title>Wine List | The Grill by A Cut</title>
    <style>
        :root { 
            --steakhouse-black: #1a1a1a; 
            --gold: #af9462; 
            --paper: #fcfaf7; 
            --font-main: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            --font-data: 'Montserrat', sans-serif;
            --light-grey: #bbb;
            --admin-red: #8b0000;
        }
        body { background-color: #111; font-family: var(--font-main); margin: 0; -webkit-font-smoothing: antialiased; }

        /* --- UI 控制元件 --- */
        
        /* 1. 搜尋框 */
        .search-wrapper { position: fixed; top: 20px; right: 20px; z-index: 1200; }
        .search-input { background-color: rgba(0,0,0,0.85); border: 1px solid var(--gold); color: var(--gold); padding: 12px 15px; font-family: var(--font-data); width: 140px; outline: none; transition: 0.3s; }
        .search-input:focus { width: 220px; border-color: #fff; }

        /* 2. 選單按鈕 */
        .open-btn { 
            display: flex; align-items: center; gap: 8px; 
            font-size: 13px; cursor: pointer; background-color: rgba(0,0,0,0.8); color: var(--gold); 
            padding: 10px 18px; border: 1px solid var(--gold); position: fixed; top: 20px; left: 20px; 
            z-index: 1300; font-family: var(--font-data); transition: 0.3s; letter-spacing: 1px;
        }
        .open-btn.active-menu { background-color: var(--gold); color: #000; left: 210px; }

        /* 3. 側邊導覽列 */
        .sidenav { height: 100%; width: 0; position: fixed; z-index: 1050; top: 0; left: 0; background-color: var(--steakhouse-black); overflow-x: hidden; transition: 0.5s; display: flex; flex-direction: column; border-right: 1px solid var(--gold); }
        .nav-links { flex: 1; padding-top: 80px; overflow-y: auto; }
        .sidenav a { padding: 15px 32px; text-decoration: none; font-size: 0.9rem; color: var(--gold); display: block; cursor: pointer; }
        
        /* 4. 價格篩選器 */
        .price-filter-section { padding: 20px 32px; border-top: 1px solid #333; background: #111; }
        .slider-container { position: relative; width: 100%; height: 20px; margin-top: 10px; display: flex; align-items: center; }
        .slider-track { width: 100%; height: 2px; background-color: #444; position: absolute; }
        input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; outline: none; position: absolute; background: transparent; pointer-events: none; margin: 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; background-color: var(--gold); cursor: pointer; border-radius: 50%; border: 2px solid #000; pointer-events: auto; position: relative; z-index: 3; }
        .price-input-flex { display: flex; justify-content: space-between; margin-top: 15px; }
        .price-box-input { background: #000; border: 1px solid #444; color: #fff; width: 45%; font-size: 0.65rem; padding: 5px; text-align: center; font-family: var(--font-data); }

        /* --- 內容區域 --- */
        .menu-container { max-width: 900px; margin: 100px auto 40px; background: var(--paper); padding: 60px; border: 1px solid var(--gold); min-height: 80vh; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        header { text-align: center; margin-bottom: 60px; border-bottom: 1px solid var(--gold); padding-bottom: 40px; }
        
        .wine-item { cursor: pointer; display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 35px; border-bottom: 1px solid #eee; padding-bottom: 25px; transition: 0.2s; }
        .wine-item.sold-out { opacity: 0.6; }
        .wine-name-row { font-size: 1.35rem; font-weight: 700; color: var(--steakhouse-black); line-height: 1.2; flex: 1; padding-right: 20px; }
        .sold-out-badge { font-size: 0.6rem; background: #888; color: #fff; padding: 2px 6px; margin-left: 10px; border-radius: 2px; vertical-align: middle; font-family: var(--font-data); font-weight: 400; display: inline-block; }

        .price-box { display: grid; grid-template-columns: 35px 1fr; align-items: baseline; width: 150px; font-weight: 600; font-size: 1.35rem; border-bottom: 2px solid #000; padding-bottom: 5px; font-family: var(--font-data); flex-shrink: 0; }
        .price-box span:first-child { font-size: 0.8rem; color: var(--gold); font-weight: 400; }
        .price-box span:last-child { text-align: right; }
        
        /* --- 彈窗 Modal --- */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); overflow-y: auto; }
        .modal-content { background: var(--paper); margin: 30px auto; padding: 40px; border: 1px solid var(--gold); width: 90%; max-width: 500px; position: relative; box-sizing: border-box; }
        
        .admin-editor-zone { background: #fdf2f2; padding: 15px; border: 1px dashed var(--admin-red); margin-bottom: 20px; }
        .admin-input { width: 100%; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; box-sizing: border-box; font-family: var(--font-data); }
        .save-btn { width: 100%; background: var(--admin-red); color: #fff; border: none; padding: 14px; cursor: pointer; font-weight: 600; font-family: var(--font-data); }

        /* --- 手機版優化 --- */
        @media (max-width: 600px) { 
            .menu-container { padding: 30px 20px; } 
            .price-box { width: 140px; } 
            .search-input { width: 100px; }
            .search-input:focus { width: 130px; }
        }
    </style>
</head>
<body>

    <div id="loader" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:3000; flex-direction:column; justify-content:center; align-items:center;">
        <div class="loader-text" style="color:var(--gold); font-family:var(--font-data); letter-spacing:4px; animation: breathe 2s infinite;">Sourcing from the Cellar...</div>
    </div>
    
    <div class="search-wrapper">
        <input type="text" id="wineSearch" class="search-input" placeholder="Search..." oninput="filterWines()">
    </div>

    <span class="open-btn" id="mainMenuBtn" onclick="toggleNav()">
        <span id="menuIcon">☰</span> <span id="btnText">Menu</span>
    </span>

    <div id="mySidenav" class="sidenav">
        <div class="nav-links" id="dynamicNav"></div>
        <div class="price-filter-section">
            <div style="color:var(--gold); font-size:0.7rem; letter-spacing:2px; margin-bottom:15px; font-family: var(--font-data);">Price Range (NT$)</div>
            <div class="slider-container">
                <div class="slider-track" id="sliderTrack"></div>
                <input type="range" min="0" max="150000" value="0" step="500" id="slider-1" oninput="slideOne()">
                <input type="range" min="0" max="150000" value="150000" step="500" id="slider-2" oninput="slideTwo()">
            </div>
            <div class="price-input-flex">
                <input type="number" id="minPriceInput" class="price-box-input" value="0" step="500" oninput="updateSliderOne()">
                <input type="number" id="maxPriceInput" class="price-box-input" value="150000" step="500" oninput="updateSliderTwo()">
            </div>
        </div>
        <div id="adminPortalArea">
            <div class="admin-entry" onclick="promptAdmin()" style="padding:20px; color:#555; font-size:0.7rem; cursor:pointer; text-align:center;">Staff Access</div>
        </div>
    </div>

    <div id="wineModal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal()" style="position:absolute;right:20px;top:10px;font-size:40px;cursor:pointer;color:var(--gold);">&times;</span>
            <div id="adminEditor" class="admin-editor-zone" style="display:none;">
                <div style="color:var(--admin-red); font-size:0.7rem; font-weight:700; margin-bottom:12px;">CELLAR MANAGEMENT</div>
                <input type="text" id="editBin" class="admin-input" placeholder="Bin">
                <input type="number" id="editStock" class="admin-input" placeholder="Stock">
                <button id="saveBtn" class="save-btn" onclick="saveAdminChange()">Save Changes</button>
            </div>
            <img id="modalImage" style="width:100%; max-height:400px; object-fit:contain; display:none; margin-bottom:20px;">
            <div id="modalOrigin" style="font-family:var(--font-data); font-size:0.7rem; color:var(--gold); margin-bottom:8px;"></div>
            <div id="modalWineName" style="font-size:1.6rem; font-weight:700; margin-bottom:5px;"></div>
            <div id="modalPrice" style="color:var(--gold); font-weight:600; font-size:1.4rem; margin-bottom:15px;"></div>
            <div id="modalDescription" style="font-size:0.95rem; line-height:1.6; color:#444; white-space:pre-line; margin-bottom:40px;"></div>
            <div id="modalMetaInfo" style="text-align:right; font-size:0.75rem; color:var(--light-grey); border-top:1px solid #eee; padding-top:15px; font-family: var(--font-data);"></div>
        </div>
    </div>

    <div id="main">
        <div class="menu-container">
            <header>
                <div style="letter-spacing:4px; color:var(--gold); font-size:0.8rem; font-weight:600; margin-bottom:10px;">The Grill by A Cut</div>
                <h1 id="pageTitle" style="color:#1a1a1a; letter-spacing: 2px;">Wine List</h1>
            </header>
            <div id="wineList"></div>
            <footer style="text-align:center; margin-top:60px; font-size:0.7rem; color:#999; border-top:1px solid #ddd; padding-top:30px; font-family:var(--font-data);">
                Developed by Sommelier Yannick "Y.K." Liu<br>© 2026. All rights reserved.
            </footer>
        </div>
    </div>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycbzub2iPaJYGNF8hoavRM_UBvySTWgMrdBuDssni86VVSLQVF15OCP0JloTvIgw95Oo8lg/exec";
        let inventory = [], activeCat = 'All', isAdmin = false, navOpen = false, currentWine = null;

        // 格式化搜尋
        const normalizeText = (t) => t.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

        // 取得資料
        async function loadData(isSilent = false) {
            if(!isSilent) document.getElementById('loader').style.display = 'flex';
            try {
                const response = await fetch(`${gasUrl}?t=${Date.now()}`);
                const data = await response.json();
                if (!isSilent) renderNav(data.categories);
                inventory = data.wines.map(r => ({
                    bin: String(r[0]||""), ref: String(r[1]||""), country: r[2]||"", region: r[3]||"",
                    name: String(r[4]||""), year: String(r[5]||""), size: String(r[6]||""),
                    price: r[8]||0, stock: parseInt(r[11]||0), desc: r[13]||"", photo: r[14]||"",
                    category: r[r.length - 1] 
                }));
                filterWines();
            } catch (e) { console.error("Sync Error"); }
            document.getElementById('loader').style.display = 'none';
        }

        // 渲染導覽
        function renderNav(categories) {
            const nav = document.getElementById('dynamicNav');
            nav.innerHTML = `<a onclick="renderCategory('All')">All Wines</a><hr style="border:0; border-top:1px solid #333; margin: 10px 30px;">`;
            categories.forEach(cat => {
                const a = document.createElement('a'); a.onclick = () => renderCategory(cat); a.innerText = cat;
                nav.appendChild(a);
            });
        }

        // 渲染清單
        function renderWines(data) {
            const listArea = document.getElementById('wineList');
            listArea.innerHTML = data.map(wine => {
                const isSoldOut = wine.stock <= 0;
                return `
                <div class="wine-item ${isSoldOut ? 'sold-out' : ''}" onclick='openWineModal(${JSON.stringify(wine).replace(/'/g, "&apos;")})'>
                    <div>
                        <div style="font-family:var(--font-data); font-size:0.7rem; color:var(--gold); margin-bottom:8px;">${wine.country} | ${wine.region}</div>
                        <div class="wine-name-row">${wine.name} <span style="color:var(--gold);font-weight:300;">${wine.year}</span> ${isSoldOut ? '<span class="sold-out-badge">SOLD OUT</span>' : ''}</div>
                        <div style="font-size:0.75rem; color:var(--light-grey); margin-top:5px; font-family:var(--font-data);">BIN: ${wine.bin} | REF: ${wine.ref}</div>
                    </div>
                    <div class="price-box"><span>NT$</span><span>${parseInt(wine.price).toLocaleString()}</span></div>
                </div>`;
            }).join('');
        }

        // 篩選功能
        function filterWines() {
            const query = normalizeText(document.getElementById('wineSearch').value);
            const min = parseInt(document.getElementById('minPriceInput').value) || 0;
            const max = parseInt(document.getElementById('maxPriceInput').value) || 999999;
            const base = (activeCat === 'All') ? inventory : inventory.filter(w => w.category === activeCat);
            renderWines(base.filter(w => {
                const p = parseInt(w.price);
                return (p >= min && p <= max) && normalizeText(w.ref + w.name + w.year).includes(query);
            }));
        }

        // 開啟 Modal
        function openWineModal(wine) {
            currentWine = wine;
            document.getElementById("modalWineName").innerText = wine.name + " " + wine.year;
            document.getElementById("modalOrigin").innerText = wine.country + " | " + wine.region;
            document.getElementById("modalPrice").innerText = "NT$ " + parseInt(wine.price).toLocaleString();
            document.getElementById("modalDescription").innerText = wine.desc || "";
            document.getElementById("modalMetaInfo").innerText = `BIN: ${wine.bin} | REF: ${wine.ref} | Stock: ${wine.stock}`;
            
            const img = document.getElementById("modalImage");
            if (wine.photo && wine.photo.startsWith("http")) { img.src = wine.photo; img.style.display = "block"; } else { img.style.display = "none"; }
            
            document.getElementById("adminEditor").style.display = isAdmin ? "block" : "none";
            if(isAdmin) { document.getElementById("editBin").value = wine.bin; document.getElementById("editStock").value = wine.stock; }
            
            document.getElementById("wineModal").style.display = "block";
            document.body.style.overflow = "hidden";
        }

        // 側邊欄切換
        function toggleNav() {
            const s = document.getElementById("mySidenav"), b = document.getElementById("mainMenuBtn");
            const icon = document.getElementById("menuIcon"), text = document.getElementById("btnText");
            if (!navOpen) { 
                s.style.width = "280px"; b.classList.add("active-menu"); 
                icon.innerText = "✕"; text.innerText = "Close"; 
                navOpen = true; 
            } else { 
                s.style.width = "0"; b.classList.remove("active-menu"); 
                icon.innerText = "☰"; text.innerText = "Menu"; 
                navOpen = false; 
            }
        }

        // 儲存異動
        async function saveAdminChange() {
            const btn = document.getElementById("saveBtn");
            btn.innerText = "Updating..."; btn.disabled = true;
            try {
                await fetch(gasUrl, {
                    method: "POST", mode: "no-cors",
                    body: JSON.stringify({ 
                        oldBin: currentWine.bin, ref: currentWine.ref, name: currentWine.name, year: currentWine.year, 
                        newBin: document.getElementById("editBin").value, newStock: document.getElementById("editStock").value 
                    })
                });
                btn.innerText = "✓ Success";
                setTimeout(() => { closeModal(); loadData(true); }, 1000);
            } catch (e) { btn.disabled = false; btn.innerText = "Error"; }
        }

        function promptAdmin() { if (prompt("Staff Code:") === "0000") { isAdmin = true; alert("Admin Mode On"); } }
        function renderCategory(cat) { activeCat = cat; document.getElementById('pageTitle').innerText = (cat === 'All' ? 'Wine List' : cat); if (navOpen) toggleNav(); filterWines(); }
        function closeModal() { document.getElementById("wineModal").style.display = "none"; document.body.style.overflow = "auto"; }
        
        // 滑桿邏輯
        function slideOne() { let s1 = document.getElementById("slider-1"), s2 = document.getElementById("slider-2"); if (parseInt(s2.value) - parseInt(s1.value) <= 1000) s1.value = parseInt(s2.value) - 1000; document.getElementById("minPriceInput").value = s1.value; fillColor(); filterWines(); }
        function slideTwo() { let s1 = document.getElementById("slider-1"), s2 = document.getElementById("slider-2"); if (parseInt(s2.value) - parseInt(s1.value) <= 1000) s2.value = parseInt(s1.value) + 1000; document.getElementById("maxPriceInput").value = s2.value; fillColor(); filterWines(); }
        function fillColor() { 
            let s1 = document.getElementById("slider-1"), s2 = document.getElementById("slider-2"); 
            let p1 = (s1.value/150000)*100, p2 = (s2.value/150000)*100; 
            document.getElementById("sliderTrack").style.background = `linear-gradient(to right, #444 ${p1}%, var(--gold) ${p1}%, var(--gold) ${p2}%, #444 ${p2}%)`; 
        }
        function updateSliderOne() { document.getElementById("slider-1").value = document.getElementById("minPriceInput").value; fillColor(); filterWines(); }
        function updateSliderTwo() { document.getElementById("slider-2").value = document.getElementById("maxPriceInput").value; fillColor(); filterWines(); }

        window.onclick = e => { if (e.target.className === "modal") closeModal(); }
        loadData();
    </script>
</body>
</html>

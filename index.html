<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
    <title>Wine List | The Grill by A cut</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="apple-mobile-web-app-title" content="Wine List|The Grill by A cut">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%231a1a1a%22/><path d=%22M25 42 Q45 35 75 42 L70 48 Q45 40 30 50 L25 42 M48 48 C48 48 46 75 58 85 C42 80 42 55 42 48 Z%22 fill=%22%23af9462%22/><circle cx=%2240%22 cy=%2243%22 r=%221.5%22 fill=%22%23af9462%22/><circle cx=%2245%22 cy=%2243%22 r=%221.5%22 fill=%22%23af9462%22/><circle cx=%2250%22 cy=%2243%22 r=%221.5%22 fill=%22%23af9462%22/></svg>">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%231a1a1a%22/><path d=%22M25 42 Q45 35 75 42 L70 48 Q45 40 30 50 L25 42 M48 48 C48 48 46 75 58 85 C42 80 42 55 42 48 Z%22 fill=%22%23af9462%22/></svg>">

    <style>
        :root { 
            --steakhouse-black: #1a1a1a;
            --gold: #af9462; 
            --paper: #fcfaf7; 
            --font-main: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            --font-data: 'Montserrat', sans-serif;
            --light-grey: #bbb;
            --admin-red: #8b0000;
        }

        body { background-color: #111; font-family: var(--font-main); margin: 0; -webkit-font-smoothing: antialiased; color: #333; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); }

        #loader { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 4000;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .loader-text { color: var(--gold); font-family: var(--font-data); font-size: 1.2rem; letter-spacing: 4px; animation: breathe 2s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .search-wrapper { position: fixed; top: 20px; right: 20px; z-index: 1200; }
        .search-input { 
            background-color: rgba(0,0,0,0.85); border: 1px solid var(--gold); color: var(--gold); 
            padding: 12px 15px; font-family: var(--font-data); width: 120px;
            outline: none; transition: 0.3s; border-radius: 0; font-size: 16px; 
        }
        .search-input:focus { width: 180px; border-color: #fff; background-color: #000; }

        .open-btn { 
            display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; 
            background-color: rgba(0,0,0,0.8); color: var(--gold); padding: 10px 18px; 
            border: 1px solid var(--gold); position: fixed; top: 20px; left: 20px; 
            z-index: 1500; font-family: var(--font-data); transition: 0.3s; letter-spacing: 1px;
        }
        .open-btn.active-menu { background-color: var(--gold); color: #000; left: 210px; }

        .sidenav { height: 100%; width: 0; position: fixed; z-index: 1300; top: 0; left: 0; background-color: var(--steakhouse-black); overflow-x: hidden; transition: 0.5s; display: flex; flex-direction: column; border-right: 1px solid var(--gold); }
        .nav-links { flex: 1; padding-top: 80px; overflow-y: auto; }
        
        /* 全域/不分類按鈕樣式 */
        .nav-links .all-cat-btn { padding: 18px 32px; text-decoration: none; font-size: 1rem; color: var(--gold); display: block; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .nav-links .all-cat-btn:hover { background: #222; }

        /* 雙層結構樣式 */
        .big-cat-block { border-bottom: 1px solid #222; }
        .big-cat-trigger { 
            width: 100%; background: transparent; border: none; padding: 16px 32px; 
            text-align: left; font-size: 0.95rem; color: #fff; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center;
            font-family: var(--font-main); transition: 0.2s; box-sizing: border-box;
        }
        .big-cat-trigger:hover { background: #222; color: var(--gold); }
        .big-cat-trigger .arrow { font-size: 0.7rem; color: var(--gold); transition: transform 0.3s; }
        .big-cat-block.active .arrow { transform: rotate(180deg); }

        .sub-tabs-container { display: none; background: #151515; padding: 5px 0; }
        .sub-tabs-container.show { display: block; }
        
        .sub-tab-link { 
            padding: 12px 32px 12px 45px; text-decoration: none; font-size: 0.85rem; 
            color: var(--light-grey); display: block; cursor: pointer; transition: 0.2s; 
        }
        .sub-tab-link:hover { color: #fff; background: #222; border-left: 4px solid var(--gold); }
        .sub-tab-link.active-sub { color: var(--gold); font-weight: 600; background: #201a12; border-left: 4px solid var(--gold); }
        
        .price-filter-section { padding: 20px 32px; border-top: 1px solid #333; background: #111; }
        .reset-btn { background: none; border: 1px solid #444; color: #888; font-size: 0.7rem; padding: 4px 8px; cursor: pointer; font-family: var(--font-data); margin-left: 8px; transition: 0.3s; }
        .slider-container { position: relative; width: 100%; height: 25px; margin-top: 10px; display: flex; align-items: center; }
        .slider-track { width: 100%; height: 2px; background-color: #444; position: absolute; }
        input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; outline: none; position: absolute; background: transparent; pointer-events: none; margin: 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; background-color: var(--gold); cursor: pointer; border-radius: 50%; border: 2px solid #000; pointer-events: auto; z-index: 3; }
        .price-input-flex { display: flex; justify-content: space-between; margin-top: 15px; }
        .price-box-input { background: #000; border: 1px solid #444; color: #fff; width: 45%; font-size: 0.8rem; padding: 8px; text-align: center; font-family: var(--font-data); }

        .menu-container { max-width: 900px; margin: 100px auto 40px; background: var(--paper); padding: 60px; border: 1px solid var(--gold); min-height: 80vh; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        header { text-align: center; margin-bottom: 60px; border-bottom: 1px solid var(--gold); padding-bottom: 40px; }
        
        .wine-item { cursor: pointer; display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 35px; border-bottom: 1px solid #eee; padding-bottom: 25px; transition: 0.2s; position: relative; }
        .wine-item.sold-out { opacity: 0.4; filter: grayscale(1); }
        .wine-name-row { font-size: 1.35rem; font-weight: 700; color: var(--steakhouse-black); line-height: 1.2; flex: 1; padding-right: 20px; }
        
        .price-box { 
            display: flex; justify-content: space-between; align-items: baseline; 
            width: 150px; font-weight: 600; font-size: 1.35rem; 
            border-bottom: 2px solid #000; padding-bottom: 5px; 
            font-family: var(--font-data); flex-shrink: 0; 
        }
        .price-box span:first-child { font-size: 0.8rem; color: var(--gold); }

        .modal { 
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); 
            overflow-y: scroll; 
            -webkit-overflow-scrolling: touch; 
            scroll-behavior: auto !important;
        }
        .close-modal-fixed { position: fixed; top: 25px; right: 30px; font-size: 50px; cursor: pointer; color: var(--gold); z-index: 2500; display: none; line-height: 1; }
        .modal-content { background: var(--paper); margin: 30px auto; padding: 40px; border: 1px solid var(--gold); width: 90%; max-width: 500px; position: relative; box-sizing: border-box; }
        #modalDescription { font-size: 1rem; line-height: 1.8; color:#444; white-space:pre-line; margin-bottom:40px; letter-spacing: 0.3px; }

        .admin-editor-zone { 
            background: var(--paper); padding: 25px; border: 1px solid var(--gold); margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .admin-label { font-family: var(--font-data); font-size: 0.7rem; color: var(--gold); letter-spacing: 1.5px; font-weight: 600; display: block; margin-bottom: 5px; }
        .admin-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid #ccc; padding: 10px 0; margin-bottom: 20px; box-sizing: border-box; font-family: var(--font-data); font-size: 1rem; color: var(--steakhouse-black); outline: none; transition: 0.3s; }
        .admin-input:focus { border-bottom-color: var(--gold); }
        .save-btn { width: 100%; background: var(--steakhouse-black); color: var(--gold); border: 1px solid var(--gold); padding: 14px; cursor: pointer; font-weight: 600; font-family: var(--font-data); letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .save-btn:hover { background: var(--gold); color: white; }
        .somm-interaction-tip { background: #fff; border: 1px solid #eee; color: #888; padding: 15px; font-size: 0.85rem; margin-bottom: 20px; font-style: italic; display: none; text-align: center; }

        .signature-footer { text-align: center; margin-top: 60px; font-size: 0.7rem; color: #999; border-top: 1px solid #ddd; padding-top: 30px; font-family: var(--font-data); }

        @media (max-width: 600px) { 
            .menu-container { padding: 40px 15px; margin-top: 80px; } 
            .wine-item { flex-direction: column; align-items: flex-start; padding-bottom: 15px; }
            .wine-name-row { font-size: 1.1rem; padding-right: 0; margin-bottom: 8px; }
            .price-box { align-self: flex-end; width: auto; min-width: 100px; font-size: 1.1rem; border-bottom: 1.5px solid var(--gold); padding-bottom: 2px; }
            .close-modal-fixed { right: 20px; top: 15px; font-size: 45px; } 
            .modal-content { padding: 30px 20px; margin: 40px auto; }
        }
    </style>
</head>
<body>

    <div id="loader"><div class="loader-text">Sourcing from the Cellar...</div></div>
    
    <span class="close-modal-fixed" id="fixedCloseBtn" onclick="closeModal()">&times;</span>

    <div class="search-wrapper"><input type="text" id="wineSearch" class="search-input" placeholder="Search..." oninput="filterWines()"></div>
    
    <span class="open-btn" id="mainMenuBtn" onclick="toggleNav()">
        <span id="menuIcon">☰</span> <span id="btnText">Menu</span>
    </span>

    <div id="mySidenav" class="sidenav">
        <div class="nav-links" id="dynamicNav"></div>
        
        <div class="price-filter-section">
            <div style="color:var(--gold); font-size:0.75rem; letter-spacing:2px; margin-bottom:15px; font-family: var(--font-data);">
                Price Range (NT$) <button class="reset-btn" onclick="resetPriceRange()">Reset↺</button>
            </div>
            <div class="slider-container">
                <div class="slider-track" id="sliderTrack"></div>
                <input type="range" min="0" max="500000" value="0" step="1000" id="slider-1" oninput="slideOne()">
                <input type="range" min="0" max="500000" value="500000" step="1000" id="slider-2" oninput="slideTwo()">
            </div>
            <div class="price-input-flex">
                <input type="number" id="minPriceInput" class="price-box-input" value="0" step="1000" oninput="updateSliderOne()">
                <input type="number" id="maxPriceInput" class="price-box-input" value="500000" step="1000" oninput="updateSliderTwo()">
            </div>
        </div>
        
        <div id="adminPortalArea">
            <div class="admin-entry" onclick="promptAdmin()" style="padding:25px; color:#555; font-size:0.75rem; cursor:pointer; text-align:center;">Staff Access</div>
        </div>
    </div>

    <div id="wineModal" class="modal">
        <div class="modal-content" id="modalScrollTarget">
            
            <div id="adminEditor" class="admin-editor-zone" style="display:none;">
                <div id="adminBadge" style="color:var(--gold); font-size:0.75rem; font-weight:700; margin-bottom:20px; letter-spacing:2px; text-align:center; border-bottom:1px solid #eee; padding-bottom:10px;">CELLAR MANAGEMENT</div>
                
                <label class="admin-label">Cellar Location (BIN)</label>
                <input type="text" id="editBin" class="admin-input" placeholder="e.g. A-101">
                
                <label class="admin-label">Stock Quantity</label>
                <input type="number" id="editStock" class="admin-input" placeholder="0">
                
                <button id="saveBtn" class="save-btn" onclick="saveAdminChange()">Update Database</button>
            </div>

            <div id="sommTip" class="somm-interaction-tip">
                <strong>Current Vintage Sold Out.</strong><br>
                Please consult our Sommelier for alternative recommendations.
            </div>

            <img id="modalImage" style="width:100%; max-height:400px; object-fit:contain; display:none; margin-bottom:20px;">
            <div id="modalOrigin" style="font-family:var(--font-data); font-size:0.75rem; color:var(--gold); margin-bottom:8px;"></div>
            <div id="modalWineName" style="font-size:1.6rem; font-weight:700; margin-bottom:5px;"></div>
            <div id="modalPrice" style="color:var(--gold); font-weight:600; font-size:1.4rem; margin-bottom:15px;"></div>
            <div id="modalDescription"></div>
            <div id="modalMetaInfo" style="text-align:right; font-size:0.75rem; color:var(--light-grey); border-top:1px solid #eee; padding-top:15px; font-family: var(--font-data);"></div>
        </div>
    </div>

    <div id="main">
        <div class="menu-container">
            <header>
                <div style="letter-spacing:4px; color:var(--gold); font-size:0.8rem; font-weight:600; margin-bottom:10px;">The Grill by A cut</div>
                <h1 id="pageTitle" style="color:#1a1a1a; letter-spacing: 2px;">Wine List</h1>
            </header>
            <div id="wineList"></div>
            <footer class="signature-footer">Developed by Sommelier Yannick "Y.K." Liu<br>© 2026. All rights reserved.</footer>
        </div>
    </div>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycbzub2iPaJYGNF8hoavRM_UBvySTWgMrdBuDssni86VVSLQVF15OCP0JloTvIgw95Oo8lg/exec";
        let inventory = [], activeCat = 'All', isAdmin = false, navOpen = false, currentWine = null;
        const authConfig = { "0000": "Somm_A", "0001": "Somm_B", "0002": "Somm_C", "0003": "Somm_D", "9029": "YK" };
        let staffName = "Digital Menu";
        const MAX_SLIDER_VAL = 500000;
        
        // 維護目前處於展開狀態的大分類集合，避免背景同步重新整理時突然縮回去
        let openedBigCategories = new Set();

        const normalizeText = (t) => t.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

        // 載入與解析邏輯
        async function loadData(isSilent = false) {
            if(!isSilent) document.getElementById('loader').style.display = 'flex';
            try {
                const response = await fetch(`${gasUrl}?t=${Date.now()}`);
                const data = await response.json();
                
                // 解析資料物件
                const fetchedWines = data.wines.map(r => ({
                    bin: String(r[0] || ""), 
                    ref: String(r[1] || ""), 
                    country: r[2] || "", 
                    region: r[3] || "",
                    name: String(r[4] || ""),
                    year: String(r[5] || ""),
                    size: String(r[6] || ""),
                    price: r[8] || 0, 
                    stock: parseInt(r[11] || 0),
                    desc: r[7] || "",     // 依後端對應索引調整
                    photo: r[9] || "",    // 依後端對應索引調整
                    category: r[12] || "",    // 子分頁名稱
                    bigCategory: r[13] || "Others" // 二級大分類
                }));

                if (!isSilent) renderNav(fetchedWines);
                
                // 背景即時同步機制
                if (isSilent && inventory.length === fetchedWines.length) {
                    fetchedWines.forEach(newWine => {
                        const oldWine = inventory.find(w => w.ref === newWine.ref && w.name === newWine.name);
                        if (oldWine) {
                            if (oldWine.stock !== newWine.stock || oldWine.bin !== newWine.bin) {
                                oldWine.stock = newWine.stock;
                                oldWine.bin = newWine.bin;
                                
                                // 局部網頁視覺刷新
                                const wineDOM = document.querySelector(`[data-ref="${newWine.ref}"]`);
                                if (wineDOM) {
                                    const isSoldOut = newWine.stock <= 0;
                                    if (isSoldOut) wineDOM.classList.add('sold-out');
                                    else wineDOM.classList.remove('sold-out');
                                    
                                    const badge = wineDOM.querySelector('.badge-sold-out');
                                    if (badge) badge.style.display = isSoldOut ? 'inline-block' : 'none';
                                    
                                    const binText = wineDOM.querySelector('.bin-text');
                                    if (binText) binText.innerText = newWine.bin;
                                }

                                // 當前彈窗無縫更新
                                if (currentWine && currentWine.ref === newWine.ref && currentWine.name === newWine.name) {
                                    document.getElementById("modalMetaInfo").innerText = `BIN: ${newWine.bin} | REF: ${newWine.ref} | ${newWine.size} | Stock: ${newWine.stock}`;
                                    document.getElementById("sommTip").style.display = newWine.stock <= 0 ? "block" : "none";
                                    if (isAdmin) {
                                        document.getElementById("editBin").value = newWine.bin;
                                        document.getElementById("editStock").value = newWine.stock;
                                    }
                                }
                            }
                        }
                    });
                } else {
                    inventory = fetchedWines;
                    filterWines();
                }
            } catch (e) { console.error("Sync Error:", e); }
            document.getElementById('loader').style.display = 'none';
        }

        // 動態渲染雙層導覽選單
        function renderNav(wines) {
            const nav = document.getElementById('dynamicNav');
            nav.innerHTML = `<a class="all-cat-btn" onclick="renderCategory('All')">All Categories</a><hr style="border:0; border-top:1px solid #333; margin: 0 30px 10px 30px;">`;
            
            // 摺疊大分類 -> 子分頁(Set) 對應關係
            const structure = new Map();
            wines.forEach(w => {
                if (!structure.has(w.bigCategory)) {
                    structure.set(w.bigCategory, new Set());
                }
                structure.get(w.bigCategory).add(w.category);
            });

            // HTML元素
            structure.forEach((subTabs, bigCat) => {
                const block = document.createElement('div');
                block.className = 'big-cat-block';
                if (openedBigCategories.has(bigCat)) {
                    block.classList.add('active');
                }

                // 一級觸發按鈕
                const trigger = document.createElement('button');
                trigger.className = 'big-cat-trigger';
                trigger.innerHTML = `<span>${bigCat}</span><span class="arrow">▼</span>`;
                
                // 二級容器
                const subContainer = document.createElement('div');
                subContainer.className = 'sub-tabs-container';
                if (openedBigCategories.has(bigCat)) {
                    subContainer.classList.add('show');
                }

                // 點擊摺疊/展開
                trigger.onclick = () => {
                    const isOpen = subContainer.classList.toggle('show');
                    block.classList.toggle('active', isOpen);
                    if (isOpen) {
                        openedBigCategories.add(bigCat);
                    } else {
                        openedBigCategories.delete(bigCat);
                    }
                };

                // 生成子選單
                subTabs.forEach(subCat => {
                    const a = document.createElement('a');
                    a.className = 'sub-tab-link';
                    if (activeCat === subCat) a.classList.add('active-sub');
                    a.innerText = subCat;
                    a.onclick = () => renderCategory(subCat);
                    subContainer.appendChild(a);
                });

                block.appendChild(trigger);
                block.appendChild(subContainer);
                nav.appendChild(block);
            });
        }

        function renderWines(data) {
            const listArea = document.getElementById('wineList');
            if(data.length === 0) { listArea.innerHTML = "<p style='text-align:center; color:#999; padding:40px;'>No wines found.</p>"; return; }
            listArea.innerHTML = data.map(wine => {
                const isSoldOut = wine.stock <= 0;
                return `
                <div class="wine-item ${isSoldOut ? 'sold-out' : ''}" data-ref="${wine.ref}" onclick="openWineModalByRef('${wine.ref}', '${wine.name.replace(/'/g, "\\'")}')">
                    <div>
                        <div style="font-family:var(--font-data); font-size:0.75rem; font-weight:600; color:var(--gold); margin-bottom:8px;">${wine.country} ${wine.region ? '| '+wine.region : ''}</div>
                        <div class="wine-name-row">
                            ${wine.name} <span style="color:var(--gold);font-weight:300;">${wine.year}</span> 
                            <span class="badge-sold-out" style="font-size:0.6rem;background:#888;color:#fff;padding:2px 6px;margin-left:10px;border-radius:2px; display: ${isSoldOut ? 'inline-block' : 'none'};">SOLD OUT</span>
                        </div>
                        <div style="font-size:0.75rem; color:var(--light-grey); margin-top:5px; font-family:var(--font-data);">
                            BIN: <span class="bin-text">${wine.bin}</span> | REF: ${wine.ref} | ${wine.size}
                        </div>
                    </div>
                    <div class="price-box">
                        <span>NT$</span>
                        <span>${parseInt(wine.price).toLocaleString()}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function filterWines() {
            const query = normalizeText(document.getElementById('wineSearch').value);
            const min = parseInt(document.getElementById('minPriceInput').value) || 0;
            const max = parseInt(document.getElementById('maxPriceInput').value) || 9999999;
            const base = (activeCat === 'All') ? inventory : inventory.filter(w => w.category === activeCat);
            renderWines(base.filter(w => {
                const p = parseInt(w.price);
                const matchQuery = normalizeText(w.ref + w.name + w.year + w.country).includes(query);
                return (p >= min && p <= max) && matchQuery;
            }));
        }

        function openWineModalByRef(ref, name) {
            // 雙欄比對，防止空REF造成錯位
            const wine = inventory.find(w => w.ref === ref && w.name === name);
            if (!wine) return;
            
            currentWine = wine;
            const modal = document.getElementById("wineModal");
            
            modal.style.display = "block";
            document.getElementById("fixedCloseBtn").style.display = "block";
            document.body.style.overflow = "hidden";

            setTimeout(() => {
                modal.scrollTop = 0;
                document.getElementById("modalScrollTarget").scrollTop = 0;
            }, 10);

            document.getElementById("modalWineName").innerText = wine.name + " " + wine.year;
            document.getElementById("modalOrigin").innerText = wine.country + (wine.region ? " | " + wine.region : "");
            document.getElementById("modalPrice").innerText = "NT$ " + parseInt(wine.price).toLocaleString();
            document.getElementById("modalDescription").innerText = wine.desc || "";
            document.getElementById("modalMetaInfo").innerText = `BIN: ${wine.bin} | REF: ${wine.ref} | ${wine.size} | Stock: ${wine.stock}`;
            document.getElementById("sommTip").style.display = wine.stock <= 0 ? "block" : "none";
            
            const img = document.getElementById("modalImage");
            if (wine.photo && wine.photo.startsWith("http")) { 
                img.src = wine.photo; 
                img.style.display = "block"; 
            } else { 
                img.style.display = "none"; 
            }
            
            document.getElementById("adminEditor").style.display = isAdmin ? "block" : "none";
            if(isAdmin) {
                document.getElementById("adminBadge").innerText = `Logged in as: ${staffName.toUpperCase()}`;
                document.getElementById("editBin").value = wine.bin;
                document.getElementById("editStock").value = wine.stock;
                resetBtnState();
            }
        }

        function closeModal() { 
            document.getElementById("wineModal").style.display = "none";
            document.getElementById("fixedCloseBtn").style.display = "none"; 
            document.body.style.overflow = "auto"; 
        }

        document.getElementById("wineModal").addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // 庫存更新寫入
        async function saveAdminChange() {
            const newBin = document.getElementById("editBin").value.trim();
            const newStock = document.getElementById("editStock").value.trim();
            const btn = document.getElementById("saveBtn");
            if (!newBin || newStock === "") { alert("Please enter valid Bin and Stock."); return; }
            
            btn.innerText = "UPDATING...";
            btn.disabled = true;
            
            try {
                await fetch(gasUrl, {
                    method: "POST", 
                    mode: "no-cors", 
                    body: JSON.stringify({ 
                        oldBin: currentWine.bin, 
                        ref: currentWine.ref || "", 
                        name: currentWine.name, 
                        year: currentWine.year, 
                        newBin: newBin, 
                        newStock: newStock, 
                        staff: staffName,
                        category: currentWine.category
                    })
                });
                
                // 快取更新
                currentWine.bin = newBin;
                currentWine.stock = parseInt(newStock);
                
                const wineDOM = document.querySelector(`[data-ref="${currentWine.ref}"]`);
                if (wineDOM) {
                    const isSoldOut = currentWine.stock <= 0;
                    if (isSoldOut) wineDOM.classList.add('sold-out');
                    else wineDOM.classList.remove('sold-out');
                    const badge = wineDOM.querySelector('.badge-sold-out');
                    if (badge) badge.style.display = isSoldOut ? 'inline-block' : 'none';
                    const binText = wineDOM.querySelector('.bin-text');
                    if (binText) binText.innerText = newBin;
                }

                document.getElementById("modalMetaInfo").innerText = `BIN: ${newBin} | REF: ${currentWine.ref} | ${currentWine.size} | Stock: ${newStock}`;
                document.getElementById("sommTip").style.display = currentWine.stock <= 0 ? "block" : "none";
                
                btn.innerText = "SUCCESSFULLY UPDATED";
                btn.style.background = "#af9462";
                btn.style.color = "#fff";
                setTimeout(resetBtnState, 2000);
                loadData(true); 
            } catch (e) { 
                btn.innerText = "ERROR"; 
                btn.disabled = false; 
            }
        }

        function resetBtnState() { 
            const btn = document.getElementById("saveBtn"); 
            btn.innerText = "Update Database"; 
            btn.style.background = "var(--steakhouse-black)"; 
            btn.style.color = "var(--gold)";
            btn.disabled = false; 
        }

        function promptAdmin() {
            const code = prompt("Enter Staff Access Code:");
            if (authConfig.hasOwnProperty(code)) {
                isAdmin = true; staffName = authConfig[code];
                document.getElementById("adminPortalArea").innerHTML = `<div style="padding:20px; text-align:center;"><div style="color:var(--gold); font-size:0.6rem; margin-bottom:10px;">Logged in as: ${staffName}</div><button onclick="location.reload()" style="background:none; border:1px solid var(--gold); color:var(--gold); cursor:pointer; padding:5px 10px; font-family:var(--font-data);">Logout</button></div>`;
                if (navOpen) toggleNav();
            } else if (code !== null) { 
                alert("Invalid Access Code."); 
            }
        }

        function toggleNav() {
            const s = document.getElementById("mySidenav"), b = document.getElementById("mainMenuBtn");
            const icon = document.getElementById("menuIcon"), text = document.getElementById("btnText");
            if (!navOpen) { 
                s.style.width = "280px"; 
                b.classList.add("active-menu"); 
                icon.innerText = "✕"; 
                text.innerText = "Close"; 
                navOpen = true; 
            } 
            else { 
                s.style.width = "0"; 
                b.classList.remove("active-menu"); 
                icon.innerText = "☰"; 
                text.innerText = "Menu"; 
                navOpen = false; 
            }
        }

        function renderCategory(cat) { 
            activeCat = cat; 
            document.getElementById('pageTitle').innerText = (cat === 'All' ? 'Wine List' : cat); 
            
            document.querySelectorAll('.sub-tab-link').forEach(link => {
                if (link.innerText === cat) link.classList.add('active-sub');
                else link.classList.remove('active-sub');
            });

            if (navOpen) toggleNav(); 
            filterWines(); 
        }
        
        function slideOne() { 
            let s1 = document.getElementById("slider-1"), s2 = document.getElementById("slider-2");
            if (parseInt(s2.value) - parseInt(s1.value) <= 2000) s1.value = parseInt(s2.value) - 2000; 
            document.getElementById("minPriceInput").value = s1.value; fillColor(); filterWines();
        }
        function slideTwo() { 
            let s1 = document.getElementById("slider-1"), s2 = document.getElementById("slider-2");
            if (parseInt(s2.value) - parseInt(s1.value) <= 2000) s2.value = parseInt(s1.value) + 2000; 
            document.getElementById("maxPriceInput").value = s2.value; fillColor(); filterWines();
        }
        function fillColor() { 
            let s1 = document.getElementById("slider-1"), s2 = document.getElementById("slider-2");
            let p1 = (s1.value / MAX_SLIDER_VAL) * 100, p2 = (s2.value / MAX_SLIDER_VAL) * 100; 
            document.getElementById("sliderTrack").style.background = `linear-gradient(to right, #444 #1a1a1a ${p1}%, var(--gold) ${p1}%, var(--gold) ${p2}%, #444 ${p2}%)`;
        }
        function updateSliderOne() { document.getElementById("slider-1").value = document.getElementById("minPriceInput").value; fillColor(); filterWines(); }
        function updateSliderTwo() { document.getElementById("slider-2").value = document.getElementById("maxPriceInput").value; fillColor(); filterWines(); }
        function resetPriceRange() {
            document.getElementById("slider-1").value = 0; document.getElementById("slider-2").value = MAX_SLIDER_VAL;
            document.getElementById("minPriceInput").value = 0; document.getElementById("maxPriceInput").value = MAX_SLIDER_VAL;
            fillColor(); filterWines();
        }

        /* 系統初始化啟動 */
        loadData();
        
        /* 每5秒背景無感刷新 */
        setInterval(() => loadData(true), 5000);
    </script>
</body>
</html>

name: Auto Sync

on:
  schedule:
    - cron: '*/30 * * * *' # 每30分鐘自動定時執行一次
  workflow_dispatch:      # 允許在GitHub Actions頁面手動點擊觸發執行

# 顯式授權權限，允許Actions機器人將更新後的資料回寫至儲存庫
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 1. 檢查並拉取專案原始碼
      uses: actions/checkout@v4.2.2
      with:
        fetch-depth: 0 # 完整拉取歷史紀錄

    - name: 2. 初始化Python環境
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.10'

    - name: 3. 安裝必要第三方套件
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    - name: 4. GSA動態同步
      run: python fetch_wines.py

    - name: 5. 檢查變更
      run: |
        # GitHub Actions虛擬機器人
        git config --global user.name "YK-SommBot"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 前端JSON加入暫存
        git add wine_data.json
        
        # 安全檢查：若無異動，則直接結束流程
        if git diff --staged --quiet; then
          echo "無變更，跳過更新。"
          exit 0
        fi
        
        # [skip ci]防止觸發額外的CI迴圈
        git commit -m "chore(auto-sync): 自動同步：更新電子酒單與庫存數據[skip ci]"
        
        # rebase機制拉取遠端最新狀態
        git pull --rebase origin main
        
        # 數據推送回GitHub遠端主分支
        git push origin main
